<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="The case for training">
  <defs>
    <linearGradient id="cft-awareness" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ad2ef"/>
      <stop offset="100%" stop-color="#4fa3d1"/>
    </linearGradient>
    <linearGradient id="cft-operations" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8dc9"/>
      <stop offset="100%" stop-color="#1f5a90"/>
    </linearGradient>
    <linearGradient id="cft-technician" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c3a5c"/>
      <stop offset="100%" stop-color="#0d1f36"/>
    </linearGradient>
  </defs>

  <!-- Base rule -->
  <line x1="20" y1="162" x2="220" y2="162" stroke="#9aa5b1" stroke-width="1"/>

  <!-- Chevron 1: Awareness (shortest) -->
  <g>
    <path d="M30,150 L66,150 L84,120 L66,90 L30,90 L48,120 Z"
          fill="url(#cft-awareness)" stroke="#0d1f36" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- Life ring symbol -->
    <circle cx="57" cy="120" r="9" fill="none" stroke="#ffffff" stroke-width="2.2"/>
    <circle cx="57" cy="120" r="3.6" fill="none" stroke="#ffffff" stroke-width="1.6"/>
    <line x1="50" y1="113" x2="53.5" y2="116.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="64" y1="113" x2="60.5" y2="116.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="50" y1="127" x2="53.5" y2="123.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="64" y1="127" x2="60.5" y2="123.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Chevron 2: Operations -->
  <g>
    <path d="M86,150 L122,150 L140,120 L122,90 L86,90 L104,120 Z"
          fill="url(#cft-operations)" stroke="#0d1f36" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- Throw bag symbol — bag with rope arc -->
    <rect x="105" y="115" width="12" height="14" rx="2" fill="#ffffff"/>
    <path d="M105,120 Q98,112 96,104" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="96" cy="104" r="2" fill="#ffffff"/>
  </g>

  <!-- Chevron 3: Technician (tallest visual weight) -->
  <g>
    <path d="M142,150 L178,150 L196,120 L178,90 L142,90 L160,120 Z"
          fill="url(#cft-technician)" stroke="#0d1f36" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- Carabiner symbol -->
    <path d="M153,106 Q149,106 149,112 L149,130 Q149,136 155,136 L165,136 Q171,136 171,130 L171,112 Q171,106 167,106"
          fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Carabiner gate -->
    <line x1="149" y1="118" x2="156" y2="114" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Upward readiness arrow -->
  <g>
    <path d="M36,76 L186,38" stroke="#2f8f5c" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M178,34 L192,37 L186,48 Z" fill="#2f8f5c"/>
  </g>

  <!-- Tier markers above chevrons: increasing dot density -->
  <g fill="#0d1f36">
    <!-- Awareness: many dots (whole unit) -->
    <circle cx="38" cy="78" r="2.2"/>
    <circle cx="46" cy="78" r="2.2"/>
    <circle cx="54" cy="78" r="2.2"/>
    <circle cx="62" cy="78" r="2.2"/>
    <circle cx="70" cy="78" r="2.2"/>
    <!-- Operations: fewer dots -->
    <circle cx="100" cy="78" r="2.2"/>
    <circle cx="108" cy="78" r="2.2"/>
    <circle cx="116" cy="78" r="2.2"/>
    <!-- Technician: smallest group -->
    <circle cx="158" cy="78" r="2.2"/>
  </g>

  <!-- River ripples below (theme tie-in) -->
  <g fill="none" stroke="#5fb8e8" stroke-width="1.2" stroke-linecap="round" opacity="0.55">
    <path d="M30,174 Q50,170 70,174 T110,174 T150,174 T190,174 T210,174"/>
    <path d="M30,180 Q50,176 70,180 T110,180 T150,180 T190,180 T210,180"/>
  </g>
</svg>
