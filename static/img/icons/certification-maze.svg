<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="The certification maze">
  <defs>
    <linearGradient id="cm-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde7f0"/>
    </linearGradient>
  </defs>

  <!-- Tangled connector lines behind -->
  <g stroke="#6a8caa" stroke-width="1.4" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M52,70 C80,50 140,100 188,72"/>
    <path d="M62,110 C100,130 150,70 184,120"/>
    <path d="M54,150 C90,130 150,160 188,148"/>
    <path d="M70,90 C110,100 130,130 172,100"/>
    <path d="M40,70 C60,90 80,60 110,80"/>
  </g>

  <!-- Stacked credential cards with ribbon headers (no readable text — just color bars) -->
  <!-- Card 1 (bottom-left) -->
  <g transform="translate(44,128) rotate(-12)">
    <rect x="0" y="0" width="74" height="44" rx="4" fill="url(#cm-card)" stroke="#1c3a5c" stroke-width="1.4"/>
    <rect x="0" y="0" width="74" height="12" rx="4" fill="#c94a4a"/>
    <rect x="0" y="8" width="74" height="4" fill="#c94a4a"/>
    <!-- Decorative lines representing text -->
    <rect x="8" y="20" width="40" height="3" rx="1.5" fill="#9aa5b1"/>
    <rect x="8" y="27" width="28" height="3" rx="1.5" fill="#c6cdd4"/>
    <!-- Stamp -->
    <circle cx="62" cy="32" r="6" fill="none" stroke="#1c3a5c" stroke-width="1.4"/>
    <path d="M58.5,32 l2.5,2.5 l4.5,-4.5" stroke="#1c3a5c" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Card 2 (middle) -->
  <g transform="translate(96,82) rotate(6)">
    <rect x="0" y="0" width="74" height="44" rx="4" fill="url(#cm-card)" stroke="#1c3a5c" stroke-width="1.4"/>
    <rect x="0" y="0" width="74" height="12" rx="4" fill="#1a6fa8"/>
    <rect x="0" y="8" width="74" height="4" fill="#1a6fa8"/>
    <rect x="8" y="20" width="50" height="3" rx="1.5" fill="#9aa5b1"/>
    <rect x="8" y="27" width="36" height="3" rx="1.5" fill="#c6cdd4"/>
    <circle cx="62" cy="32" r="6" fill="none" stroke="#1c3a5c" stroke-width="1.4"/>
    <path d="M58.5,32 l2.5,2.5 l4.5,-4.5" stroke="#1c3a5c" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Card 3 (top) -->
  <g transform="translate(64,32) rotate(-4)">
    <rect x="0" y="0" width="74" height="44" rx="4" fill="url(#cm-card)" stroke="#1c3a5c" stroke-width="1.4"/>
    <rect x="0" y="0" width="74" height="12" rx="4" fill="#2f8f5c"/>
    <rect x="0" y="8" width="74" height="4" fill="#2f8f5c"/>
    <rect x="8" y="20" width="44" height="3" rx="1.5" fill="#9aa5b1"/>
    <rect x="8" y="27" width="32" height="3" rx="1.5" fill="#c6cdd4"/>
    <!-- Red X stamp (this credential expired) -->
    <circle cx="62" cy="32" r="6" fill="none" stroke="#c94a4a" stroke-width="1.4"/>
    <path d="M58.8,28.8 l6.4,6.4 M65.2,28.8 l-6.4,6.4" stroke="#c94a4a" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Orbiting small badges (no text, just symbols) -->
  <!-- Medical cross -->
  <g>
    <circle cx="28" cy="52" r="11" fill="#c94a4a" stroke="#1c3a5c" stroke-width="1.4"/>
    <rect x="26.5" y="46" width="3" height="12" fill="#ffffff"/>
    <rect x="22" y="50.5" width="12" height="3" fill="#ffffff"/>
  </g>
  <!-- Shield -->
  <g>
    <path d="M210,48 L210,58 Q210,68 202,70 Q194,68 194,58 L194,48 Z" fill="#1a6fa8" stroke="#1c3a5c" stroke-width="1.4"/>
    <path d="M198,58 l3,3 l6,-6" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Rope knot circle -->
  <g>
    <circle cx="212" cy="152" r="11" fill="#f28a3a" stroke="#1c3a5c" stroke-width="1.4"/>
    <path d="M206,152 Q209,146 212,152 Q215,158 218,152" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M206,152 Q209,158 212,152 Q215,146 218,152" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <!-- Star (regional) -->
  <g>
    <circle cx="24" cy="160" r="11" fill="#f4c76a" stroke="#1c3a5c" stroke-width="1.4"/>
    <path d="M24,154 l1.9,3.8 l4.2,0.6 l-3,2.9 l0.7,4.2 l-3.8,-2 l-3.8,2 l0.7,-4.2 l-3,-2.9 l4.2,-0.6 Z" fill="#ffffff"/>
  </g>
</svg>
