<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="Urban versus backcountry">
  <defs>
    <linearGradient id="uvb-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fb8e8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1a6fa8" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="uvb-mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4a5c"/>
      <stop offset="100%" stop-color="#1c2836"/>
    </linearGradient>
    <linearGradient id="uvb-bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b6b80"/>
      <stop offset="100%" stop-color="#2a3644"/>
    </linearGradient>
  </defs>

  <!-- Divider -->
  <line x1="120" y1="22" x2="120" y2="178" stroke="#9aa5b1" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>

  <!-- LEFT: Backcountry -->
  <g>
    <!-- Back mountain -->
    <path d="M10,150 L42,82 L68,118 L88,70 L112,140 L112,164 L10,164 Z" fill="url(#uvb-mtn)" opacity="0.65"/>
    <!-- Front mountain with snow -->
    <path d="M6,160 L34,92 L58,130 L80,74 L108,146 L112,172 L6,172 Z" fill="url(#uvb-mtn)"/>
    <path d="M32,94 L34,92 L44,108 L40,110 Z" fill="#ffffff" opacity="0.9"/>
    <path d="M78,76 L80,74 L90,94 L86,96 Z" fill="#ffffff" opacity="0.9"/>
    <!-- Pine tree -->
    <path d="M28,150 L24,156 L32,156 L28,162 L34,162 L28,168 L28,172" stroke="#1c2836" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- River current -->
    <path d="M10,176 Q30,170 50,178 T92,176 T114,178" fill="none" stroke="url(#uvb-water)" stroke-width="6" stroke-linecap="round"/>
    <!-- Whitewater ticks -->
    <path d="M26,174 l3,-2 M48,176 l3,-2 M72,174 l3,-2 M94,176 l3,-2" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- RIGHT: Urban -->
  <g transform="translate(128,0)">
    <!-- Buildings -->
    <rect x="4" y="92" width="16" height="80" fill="url(#uvb-bldg)"/>
    <rect x="24" y="68" width="22" height="104" fill="url(#uvb-bldg)"/>
    <rect x="50" y="100" width="14" height="72" fill="url(#uvb-bldg)"/>
    <rect x="68" y="52" width="20" height="120" fill="url(#uvb-bldg)"/>
    <rect x="92" y="82" width="16" height="90" fill="url(#uvb-bldg)"/>
    <!-- Antenna -->
    <line x1="78" y1="52" x2="78" y2="42" stroke="#2a3644" stroke-width="1.6"/>
    <circle cx="78" cy="42" r="1.6" fill="#f28a3a"/>
    <!-- Lit windows -->
    <g fill="#f4c76a" opacity="0.92">
      <rect x="8" y="104" width="3" height="4"/>
      <rect x="14" y="104" width="3" height="4"/>
      <rect x="8" y="120" width="3" height="4"/>
      <rect x="14" y="120" width="3" height="4"/>
      <rect x="28" y="78" width="3" height="4"/>
      <rect x="34" y="78" width="3" height="4"/>
      <rect x="40" y="78" width="3" height="4"/>
      <rect x="28" y="92" width="3" height="4"/>
      <rect x="40" y="92" width="3" height="4"/>
      <rect x="28" y="106" width="3" height="4"/>
      <rect x="34" y="106" width="3" height="4"/>
      <rect x="28" y="120" width="3" height="4"/>
      <rect x="40" y="120" width="3" height="4"/>
      <rect x="54" y="114" width="3" height="4"/>
      <rect x="58" y="114" width="3" height="4"/>
      <rect x="72" y="64" width="3" height="4"/>
      <rect x="78" y="64" width="3" height="4"/>
      <rect x="84" y="64" width="3" height="4"/>
      <rect x="72" y="80" width="3" height="4"/>
      <rect x="84" y="80" width="3" height="4"/>
      <rect x="72" y="96" width="3" height="4"/>
      <rect x="78" y="96" width="3" height="4"/>
      <rect x="72" y="112" width="3" height="4"/>
      <rect x="84" y="112" width="3" height="4"/>
      <rect x="96" y="94" width="3" height="4"/>
      <rect x="102" y="94" width="3" height="4"/>
      <rect x="96" y="108" width="3" height="4"/>
      <rect x="96" y="124" width="3" height="4"/>
    </g>
    <!-- Flooded street -->
    <rect x="0" y="172" width="112" height="6" fill="url(#uvb-water)" opacity="0.9"/>
    <!-- Storm drain grate -->
    <rect x="38" y="170" width="20" height="2.4" fill="#0d1f2c"/>
    <line x1="41" y1="170" x2="41" y2="172" stroke="#9aa5b1" stroke-width="0.9"/>
    <line x1="45" y1="170" x2="45" y2="172" stroke="#9aa5b1" stroke-width="0.9"/>
    <line x1="49" y1="170" x2="49" y2="172" stroke="#9aa5b1" stroke-width="0.9"/>
    <line x1="53" y1="170" x2="53" y2="172" stroke="#9aa5b1" stroke-width="0.9"/>
    <!-- Ripple -->
    <path d="M4,177 Q20,175 36,177 T68,177 T100,177" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.65"/>
  </g>
</svg>
