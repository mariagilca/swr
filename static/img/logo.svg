<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Backcountry Swiftwater Rescue">
  <defs>
    <linearGradient id="logo-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fb8e8"/>
      <stop offset="100%" stop-color="#1a6fa8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square badge -->
  <rect x="2" y="2" width="60" height="60" rx="10" fill="url(#logo-water)"/>

  <!-- Mountain silhouette (backcountry) -->
  <path d="M6,44 L18,26 L26,34 L36,20 L50,40 L58,44 Z" fill="#0d2c4a" opacity="0.85"/>
  <!-- Snow caps -->
  <path d="M17,28 L18,26 L21,30 L19,31 Z" fill="#ffffff" opacity="0.9"/>
  <path d="M35,22 L36,20 L41,28 L38,29 Z" fill="#ffffff" opacity="0.9"/>

  <!-- Wave (swiftwater) -->
  <path d="M6,48 Q14,43 22,48 T38,48 T58,48 L58,56 L6,56 Z" fill="#ffffff" opacity="0.92"/>
  <path d="M6,52 Q14,47 22,52 T38,52 T58,52" fill="none" stroke="#1a6fa8" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>

  <!-- Rescue throw-bag rope loop (small accent) -->
  <circle cx="50" cy="14" r="5" fill="none" stroke="#f28a3a" stroke-width="2"/>
  <path d="M50,19 L50,24" stroke="#f28a3a" stroke-width="2" stroke-linecap="round"/>
</svg>
